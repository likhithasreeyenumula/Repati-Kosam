<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant - Repati Kosam</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fc;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:240px;
height:100%;
background:#0f4c81;
padding-top:20px;
}

.sidebar h2{
color:white;
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:15px 25px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#1d7dd8;
}

.topbar{
position:fixed;
left:240px;
right:0;
top:0;
height:70px;
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 30px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:45px;
height:45px;
border-radius:50%;
}

.main{
margin-left:240px;
margin-top:90px;
padding:20px;
}

.chat-container{
background:white;
height:500px;
border-radius:15px;
padding:20px;
overflow-y:auto;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.bot{
background:#eaf4ff;
padding:12px;
border-radius:10px;
margin-bottom:10px;
width:fit-content;
max-width:70%;
}

.user{
background:#1d7dd8;
color:white;
padding:12px;
border-radius:10px;
margin-left:auto;
margin-bottom:10px;
width:fit-content;
max-width:70%;
}

.input-area{
display:flex;
margin-top:15px;
gap:10px;
}

input{
flex:1;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:12px 20px;
background:#1d7dd8;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0f4c81;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>Repati Kosam</h2>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="medication.html">💊 Medication</a>
<a href="history.html">📜 History</a>
<a href="records.html">📋 Records</a>
<a href="sos.html">🚨 SOS</a>
<a href="ai-assistant.html">🤖 AI Assistant</a>
<a href="profile.html">👤 Profile</a>
</div>

<div class="topbar">

<h3>AI Health Assistant</h3>

<div class="profile">
<img src="images/profile.png" alt="Profile">
<div>
<b>Srinivas</b><br>
<small>Patient</small>
</div>
</div>

</div>

<div class="main">

<div class="chat-container" id="chat">

<div class="bot">
👋 Hello! I am your Repati Kosam AI Assistant.
<br><br>
I can help you with:
<ul>
<li>Medicine reminders</li>
<li>Dosage information</li>
<li>Health tips</li>
<li>Emergency guidance</li>
</ul>
</div>

</div>

<div class="input-area">

<input type="text"
id="userInput"
placeholder="Ask something about your medicine...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

function sendMessage(){

let input=document.getElementById("userInput");

let chat=document.getElementById("chat");

if(input.value.trim()=="") return;

chat.innerHTML +=
'<div class="user">'+input.value+'</div>';

let reply="Please consult your doctor for medical decisions. I can help with reminders, schedules, and general medication information.";

chat.innerHTML +=
'<div class="bot">'+reply+'</div>';

input.value="";

chat.scrollTop=chat.scrollHeight;
}

</script>

</body>
</html>
