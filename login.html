<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Repati Kosam</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background-image: url('images/background.jpg');
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
    background-repeat: no-repeat;
  background-attachment: fixed;
  background-size: cover;
}

.container{
    width:400px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#0f4c81;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#1d7dd8;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0f4c81;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#1d7dd8;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Login</h2>

<form action="dashboard.html">

<div class="input-group">
<label>Email</label>
<input type="email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" required>
</div>

<button type="submit">Login</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</form>

</div>

</body>
</html>
