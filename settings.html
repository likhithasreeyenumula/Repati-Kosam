<!-- Top Bar -->

<div class="topbar">

<h3>Settings</h3>

<div class="profile">
<img src="images/profile.png" alt="Profile">

<div>
<b>Srinivas</b><br>
<small>Patient</small>
</div>

</div>

</div>

<!-- Main Content -->

<div class="main">

<div class="card">

<h2>🔔 Notification Settings</h2>

<label>
<input type="checkbox" checked>
 Medicine Reminder Notifications
</label>

<br><br>

<label>
<input type="checkbox" checked>
 SMS Notifications
</label>

<br><br>

<label>
<input type="checkbox">
 Email Notifications
</label>

</div>

<div class="card">

<h2>⏰ Reminder Preferences</h2>

<label>Reminder Before Medicine</label>

<select>
<option>5 Minutes Before</option>
<option selected>10 Minutes Before</option>
<option>15 Minutes Before</option>
<option>30 Minutes Before</option>
<option>1 Hour Before</option>
</select>

</div>

<div class="card">

<h2>🌙 Appearance</h2>

<label>
<input type="radio" name="theme" checked>
 Light Mode
</label>

<br><br>

<label>
<input type="radio" name="theme">
 Dark Mode
</label>

</div>

<div class="card">

<h2>🔒 Privacy & Security</h2>

<label>
<input type="checkbox" checked>
 Enable Account Security Alerts
</label>

<br><br>

<label>
<input type="checkbox" checked>
 Require Login Authentication
</label>

<br><br>

<button class="btn">
Change Password
</button>

</div>

<div class="card">

<h2>🚨 Emergency Settings</h2>

<label>
<input type="checkbox" checked>
 Send SOS Alert To Emergency Contacts
</label>

<br><br>

<label>
<input type="checkbox" checked>
 Share Current Location During SOS
</label>

</div>

<div class="card">

<h2>💾 Data Management</h2>

<button class="btn">
📥 Download My Records
</button>

<br><br>

<button class="btn delete">
🗑 Delete Account
</button>

</div>

<div class="card">

<button class="btn" style="width:100%;">
💾 Save Settings
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
